        const IN_SEASON = {

            2:  ['Navel oranges 🍊', 'Pixie tangerines', 'Blood oranges', 'Grapefruits', 'Lemons 🍋', 'Avocados 🥑', 'Broccoli 🥦', 'Cabbage', 'Carrots 🥕', 'Kale 🥬', 'Chard', 'Lettuce', 'Arugula', 'Beets', 'Radishes', 'Dandelion greens', 'Winter squash', 'Fresh herbs 🌿'],
            3:  ['Strawberries 🍓', 'Navel oranges 🍊', 'Lemons 🍋', 'Avocados 🥑', 'Broccoli 🥦', 'Cabbage', 'Carrots 🥕', 'Kale 🥬', 'Chard', 'Lettuce', 'Arugula', 'Beets', 'Radishes', 'Dandelion greens', 'Winter squash', 'Artichokes', 'Asparagus', 'Snap peas 🫛', 'Spring onions 🧅', 'Fresh herbs 🌿'],
            4:  ['Strawberries 🍓', 'Avocados 🥑', 'Lemons 🍋', 'Cherries (early) 🍒', 'Broccoli 🥦', 'Cabbage', 'Kale 🥬', 'Lettuce', 'Arugula', 'Beets', 'Radishes', 'Dandelion greens', 'Cucumbers 🥒', 'Summer squash', 'Artichokes', 'Asparagus', 'Snap peas 🫛', 'Green garlic 🧄', 'Spring onions 🧅', 'Fresh herbs 🌿'],
            5:  ['Strawberries 🍓', 'Cherries 🍒', 'Apricots (early)', 'Avocados 🥑', 'Lemons 🍋', 'Broccoli 🥦', 'Carrots 🥕', 'Lettuce', 'Arugula', 'Beets', 'Radishes', 'Dandelion greens', 'Cucumbers 🥒', 'Summer squash', 'Eggplant 🍆', 'Tomatoes 🍅', 'Snap peas 🫛', 'Fresh herbs 🌿'],
            6:  ['Peaches 🍑', 'Nectarines', 'Cherries 🍒', 'Apricots', 'Plums', 'Strawberries 🍓', 'Blueberries 🫐', 'Blackberries', 'Raspberries', 'Avocados 🥑', 'Broccoli 🥦', 'Carrots 🥕', 'Beets', 'Radishes', 'Cucumbers 🥒', 'Summer squash', 'Eggplant 🍆', 'Tomatoes 🍅', 'Bell peppers 🫑', 'Corn (early) 🌽', 'Fresh herbs 🌿'],
            7:  ['Peaches 🍑', 'White peaches', 'Donut peaches', 'Nectarines', 'Plums', 'Pluots', 'Figs (early)', 'Blackberries', 'Raspberries', 'Blueberries 🫐', 'Avocados 🥑', 'Carrots 🥕', 'Beets', 'Radishes', 'Arugula', 'Cucumbers 🥒', 'Summer squash', 'Eggplant 🍆', 'Tomatoes 🍅', 'Bell peppers 🫑', 'Shishito peppers', 'Corn 🌽', 'Melons 🍈', 'Watermelon', 'Romano beans', 'Fresh herbs 🌿'],
            8:  ['Peaches 🍑', 'Nectarines', 'Plums', 'Pluots', 'Figs', 'Blackberries', 'Raspberries', 'Apples 🍎 (early)', 'Avocados 🥑', 'Carrots 🥕', 'Beets', 'Radishes', 'Arugula', 'Cucumbers 🥒', 'Summer squash', 'Eggplant 🍆', 'Tomatoes 🍅', 'Bell peppers 🫑', 'Spicy chilies 🌶️', 'Corn 🌽', 'Melons 🍈', 'Watermelon', 'Fresh herbs 🌿'],
            9:  ['Figs', 'Apples 🍎', 'Pears 🍐', 'Grapes 🍇', 'Pomegranates (early)', 'Persimmons (early)', 'Avocados 🥑 (peak)', 'Beets', 'Arugula', 'Cucumbers 🥒', 'Summer squash', 'Eggplant 🍆', 'Tomatoes 🍅', 'Bell peppers 🫑', 'Winter squash', 'Sweet potatoes 🍠 (early)', 'Fresh herbs 🌿'],
            10: ['Apples 🍎', 'Pears 🍐', 'Grapes 🍇', 'Pomegranates', 'Persimmons', 'Avocados 🥑', 'Beets', 'Arugula', 'Celery', 'Lettuce', 'Radishes', 'Dandelion greens', 'Cucumbers 🥒', 'Summer squash', 'Eggplant 🍆', 'Tomatoes 🍅', 'Winter squash', 'Butternut squash', 'Acorn squash', 'Sweet potatoes 🍠', 'Kale 🥬', 'Broccoli 🥦', 'Cauliflower', 'Early mandarins', 'Fresh herbs 🌿'],
            11: ['Mandarins', 'Satsumas', 'Pomegranates', 'Persimmons', 'Apples 🍎', 'Pears 🍐', 'Avocados 🥑', 'Broccoli 🥦', 'Cabbage', 'Carrots 🥕', 'Celery', 'Chard', 'Kale 🥬', 'Lettuce', 'Arugula', 'Beets', 'Radishes', 'Dandelion greens', 'Cucumbers 🥒', 'Summer squash', 'Tomatoes 🍅', 'Winter squash', 'Sweet potatoes 🍠', 'Brussels sprouts', 'Leeks', 'Fennel', 'Fresh herbs 🌿'],
            12: ['Navel oranges 🍊', 'Mandarins', 'Satsumas', 'Grapefruits', 'Lemons 🍋', 'Avocados 🥑', 'Pomegranates (late)', 'Persimmons', 'Broccoli 🥦', 'Cabbage', 'Carrots 🥕', 'Celery', 'Chard', 'Kale 🥬', 'Lettuce', 'Arugula', 'Beets', 'Radishes', 'Summer squash', 'Tomatoes 🍅', 'Winter squash', 'Brussels sprouts', 'Cauliflower', 'Fennel', 'Leeks', 'Parsnips', 'Fresh herbs 🌿'],
        };

        const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        function getNextDayOfWeek(dayOfWeek) {
            const today = new Date();
            let daysToAdd = dayOfWeek - today.getDay();
            if (daysToAdd <= 0) daysToAdd += 7;
            const target = new Date(today);
            target.setDate(today.getDate() + daysToAdd);
            return target;
        }

        function getOpenHours(market, date) {
            const oh = market.openHours;
            if (!oh) return null;
            if (Array.isArray(oh)) {
                const month = date.getMonth() + 1;
                return oh.find(p => p.months.includes(month)) || null;
            }
            return oh;
        }

        function isOpenNow(market) {
            const now = new Date();
            const oh = getOpenHours(market, now);
            if (!oh) return false;
            const hour = now.getHours() + now.getMinutes() / 60;
            return hour >= oh.open && hour < oh.close;
        }

        let selectedTab = 'today';

        function setTab(tab) {
            selectedTab = tab;
            render();
        }

        function mapsUrl(address) {
            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address + ', San Diego, CA')}`;
        }

        function renderMarketCard(m, showOpenNow) {
            const open = showOpenNow && isOpenNow(m);
            return `
                <div class="bg-white rounded-xl shadow-md p-4 mb-3 ${open ? 'ring-2 ring-green-500' : ''}">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-gray-900 text-lg">${m.name}</span>
                                ${open ? '<span class="flex items-center gap-1 text-xs font-semibold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">● Open now</span>' : ''}
                                ${m.dogFriendly ? '<span title="Dog friendly" class="text-base cursor-help">🐾</span>' : ''}
                            </div>
                            <div class="text-green-700 text-sm font-medium">${m.neighborhood}</div>
                        </div>
                        <div class="text-right shrink-0 ml-2">
                            <div class="text-gray-700 font-semibold text-sm">${m.hours}</div>
                        </div>
                    </div>
                    <div class="mt-2">
                        <a href="${mapsUrl(m.address)}" target="_blank" rel="noopener noreferrer"
                           class="text-sm text-blue-600 hover:underline">${m.address}</a>
                        ${m.parking ? `<div class="text-xs text-gray-400 mt-1">🅿️ ${m.parking}</div>` : ''}
                        ${m.note ? `<div class="text-xs text-amber-600 mt-1">⚠️ ${m.note}</div>` : ''}
                    </div>
                </div>`;
        }

        function renderMarkets(dayOfWeek, showOpenNow) {
            const markets = MARKETS.filter(m => m.day === dayOfWeek);
            if (!markets.length) {
                return `<div class="text-white/60 text-center py-8">No farmers markets today.</div>`;
            }
            const regions = ['Central', 'North County', 'East County', 'South Bay'];
            return regions.map(region => {
                const group = markets.filter(m => m.region === region);
                if (!group.length) return '';
                return `
                    <div class="text-white/70 text-xs font-semibold uppercase tracking-wider mb-2 mt-4 first:mt-0">${region}</div>
                    ${group.map(m => renderMarketCard(m, showOpenNow)).join('')}
                `;
            }).join('');
        }

        function render() {
            const today = new Date();
            const todayDay = today.getDay();
            const isSaturday = todayDay === 6;
            const isSunday = todayDay === 0;
            const nextSaturday = getNextDayOfWeek(6);
            const nextSunday = getNextDayOfWeek(0);
            const month = today.getMonth() + 1;
            const inSeason = IN_SEASON[month] || [];

            const tabBtn = (tab, label, date, extra = '') =>
                `<button onclick="setTab('${tab}')"
                    class="flex-1 py-1.5 px-2 text-sm font-semibold transition-colors ${extra} ${selectedTab === tab ? 'bg-green-700 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}">
                    <div>${label}</div>
                    <div class="text-xs font-normal ${selectedTab === tab ? 'text-green-100' : 'text-gray-500'}">${date}</div>
                </button>`;

            const todayDate = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            const satDate = nextSaturday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            const sunDate = nextSunday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            let displayDay;
            if (selectedTab === 'today') displayDay = todayDay;
            else if (selectedTab === 'saturday') displayDay = 6;
            else displayDay = 0;

            const showOpenNow = selectedTab === 'today';

            // Border logic: middle tab gets border-l border-r, last visible tab gets border-l
            const satBorder = !isSunday ? 'border-l border-r border-gray-200' : 'border-l border-gray-200';

            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-green-900 via-green-800 to-emerald-700 p-3">
                    <div class="max-w-lg mx-auto">
                        <div class="text-center mb-3 pt-2">
                            <h1 class="text-2xl font-bold text-white drop-shadow">San Diego Farmers Markets 🍓🧺🥑</h1>
                        </div>

                        <!-- In season -->
                        <div class="bg-white/20 rounded-xl p-3 mb-3 text-white">
                            <div class="text-xs font-semibold uppercase tracking-wider text-white/70 mb-1.5">In season now</div>
                            <div class="flex flex-wrap gap-1.5">
                                ${inSeason.map(item => `<span class="bg-white text-gray-700 text-xs px-2 py-0.5 rounded-full">${item}</span>`).join('')}
                            </div>
                        </div>

                        <!-- Tabs -->
                        <div class="bg-white rounded-lg shadow-md overflow-hidden mb-3">
                            <div class="flex">
                                ${tabBtn('today', DAY_NAMES[todayDay], todayDate)}
                                ${!isSaturday ? tabBtn('saturday', 'Saturday', satDate, satBorder) : ''}
                                ${!isSunday ? tabBtn('sunday', 'Sunday', sunDate, (isSaturday ? 'border-l border-gray-200' : '')) : ''}
                            </div>
                        </div>

                        ${renderMarkets(displayDay, showOpenNow)}

                        <div class="text-center text-white/30 text-xs mt-6 pb-4">
                            <a href="https://www.locallywell.com/farmers-markets-in-san-diego/" target="_blank" rel="noopener noreferrer" class="hover:text-white/60 underline">LocallyWell</a>
                            · <a href="https://sandiegomagazine.com/food-drink/farmers-markets-san-diego/" target="_blank" rel="noopener noreferrer" class="hover:text-white/60 underline">San Diego Magazine</a>
                            · <a href="https://www.bewiseranch.com/harvestschedule.htm" target="_blank" rel="noopener noreferrer" class="hover:text-white/60 underline">Be Wise Ranch</a>
                        </div>
                    </div>
                </div>
            `;
        }

        render();
    </script>
